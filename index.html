<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>機車 G 力遙測器 (帶數據記錄)</title>
  <style>
    body {
      margin: 0;
      background-color: #1a1a1a;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: sans-serif;
      overflow: hidden;
    }
    #dashboard {
      position: relative;
      width: 320px;
      height: 320px;
    }
    canvas {
      background-color: #2a2a2a;
      border-radius: 50%;
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
    }
    #startBtn {
      padding: 15px 30px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      background-color: #007bff;
      color: white;
      margin-bottom: 20px;
      cursor: pointer;
    }
    #controls {
      display: none;
      margin-bottom: 20px;
    }
    .action-btn {
      padding: 12px 24px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      background-color: #28a745; /* 預設綠色 */
      transition: background-color 0.3s;
    }
    .recording {
      background-color: #dc3545 !important; /* 錄製中變紅色 */
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }
    .info {
      margin-top: 20px;
      font-family: monospace;
      font-size: 16px;
      text-align: center;
      line-height: 1.5;
    }
    #recordStatus {
      color: #ffc107;
      font-size: 14px;
      margin-top: 10px;
      min-height: 20px;
    }
  </style>
</head>
<body>

  <button id="startBtn">啟動感測器 (Start)</button>
  
  <div id="controls">
    <button id="recordBtn" class="action-btn">開始記錄 (Record)</button>
  </div>
  
  <div id="dashboard">
    <canvas id="gForceCanvas" width="320" height="320"></canvas>
  </div>

  <div class="info">
    Lat G (X): <span id="xVal">0.00</span> G<br>
    Lon G (Y): <span id="yVal">0.00</span> G
    <div id="recordStatus"></div>
  </div>

  <script>
    const canvas = document.getElementById('gForceCanvas');
    const ctx = canvas.getContext('2d');
    const startBtn = document.getElementById('startBtn');
    const controls = document.getElementById('controls');
    const recordBtn = document.getElementById('recordBtn');
    const xVal = document.getElementById('xVal');
    const yVal = document.getElementById('yVal');
    const recordStatus = document.getElementById('recordStatus');

    const center = { x: canvas.width / 2, y: canvas.height / 2 };
    const maxG = 1.2; // 調整圓盤邊緣為 1.2G
    const gToMs2 = 9.81; 
    const scale = (canvas.width / 2) / (maxG * gToMs2); 

    let currentX = 0;
    let currentY = 0;
    const alpha = 0.15; // 低通濾波參數

    // === 數據記錄相關變數 ===
    let isRecording = false;
    let telemetryData = [];
    let startTime = 0;
    let dataCount = 0;

    function drawBackground() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      ctx.strokeStyle = '#555';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(center.x, 0); ctx.lineTo(center.x, canvas.height);
      ctx.moveTo(0, center.y); ctx.lineTo(canvas.width, center.y);
      ctx.stroke();

      // 畫 0.4G, 0.8G, 1.2G 同心圓
      const gLevels = [0.4, 0.8, 1.2];
      gLevels.forEach(g => {
        ctx.beginPath();
        ctx.arc(center.x, center.y, g * gToMs2 * scale, 0, 2 * Math.PI);
        ctx.strokeStyle = '#777';
        ctx.stroke();
        
        ctx.fillStyle = '#aaa';
        ctx.font = '12px sans-serif';
        ctx.fillText(g.toFixed(1) + 'G', center.x + 5, center.y - (g * gToMs2 * scale) + 15);
      });
    }

    function drawDot(accX, accY) {
      drawBackground();

      let plotX = center.x - (accX * scale); 
      let plotY = center.y + (accY * scale);

      ctx.fillStyle = isRecording ? '#00ffcc' : '#ff3b30'; // 錄製時亮青色，平常紅色
      ctx.beginPath();
      ctx.arc(plotX, plotY, 12, 0, 2 * Math.PI);
      ctx.fill();

      ctx.shadowBlur = 10;
      ctx.shadowColor = isRecording ? '#00ffcc' : 'red';
    }

    function handleMotion(event) {
      let acc = event.acceleration;
      if (!acc.x) return; 

      // 濾波處理
      currentX = currentX + alpha * (acc.x - currentX);
      currentY = currentY + alpha * (acc.y - currentY);

      drawDot(currentX, currentY);

      let gX = (currentX / gToMs2).toFixed(2);
      let gY = (currentY / gToMs2).toFixed(2);

      xVal.innerText = gX;
      yVal.innerText = gY;

      // === 記錄數據邏輯 ===
      if (isRecording) {
        const timeElapsed = Date.now() - startTime;
        const rawGX = (acc.x / gToMs2).toFixed(4);
        const rawGY = (acc.y / gToMs2).toFixed(4);
        const filteredGX = (currentX / gToMs2).toFixed(4);
        const filteredGY = (currentY / gToMs2).toFixed(4);
        
        // 儲存格式: 時間(ms), 原始X, 原始Y, 濾波X, 濾波Y
        telemetryData.push([timeElapsed, rawGX, rawGY, filteredGX, filteredGY]);
        dataCount++;
        
        // 每 10 筆數據更新一次 UI，避免拖慢效能
        if (dataCount % 10 === 0) {
            recordStatus.innerText = `🔴 錄製中... 已記錄 ${dataCount} 筆數據`;
        }
      }
    }

    // === 匯出 CSV 檔案邏輯 ===
    function exportCSV() {
      if (telemetryData.length === 0) return;

      let csvContent = "Time(ms),Raw_X(G),Raw_Y(G),Filtered_X(G),Filtered_Y(G)\n";
      telemetryData.forEach(row => {
        csvContent += row.join(",") + "\n";
      });

      // 加上 BOM (0xEF, 0xBB, 0xBF) 讓 Excel 也能正確識別 UTF-8
      const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csvContent], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      
      const link = document.createElement("a");
      link.setAttribute("href", url);
      // 檔名加上時間戳記避免覆蓋
      link.setAttribute("download", `telemetry_${new Date().toISOString().slice(0,19).replace(/:/g,"-")}.csv`);
      
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url); // 釋放記憶體
      
      recordStatus.innerText = `✅ 已下載 ${dataCount} 筆數據！`;
    }

    // === 按鈕事件監聽 ===
    recordBtn.addEventListener('click', () => {
      if (!isRecording) {
        // 開始記錄
        isRecording = true;
        telemetryData = [];
        dataCount = 0;
        startTime = Date.now();
        
        recordBtn.innerText = '停止並儲存 (Stop & Save)';
        recordBtn.classList.add('recording');
      } else {
        // 停止記錄並匯出
        isRecording = false;
        recordBtn.innerText = '開始記錄 (Record)';
        recordBtn.classList.remove('recording');
        
        exportCSV();
      }
    });

    startBtn.addEventListener('click', async () => {
      if (typeof DeviceMotionEvent.requestPermission === 'function') {
        try {
          const permission = await DeviceMotionEvent.requestPermission();
          if (permission === 'granted') {
            window.addEventListener('devicemotion', handleMotion);
            startBtn.style.display = 'none';
            controls.style.display = 'block'; // 顯示記錄按鈕
          } else {
            alert('需要動作感測器權限才能顯示 G 力！');
          }
        } catch (error) {
          console.error(error);
          alert('請確保網頁使用 HTTPS 連線。');
        }
      } else {
        window.addEventListener('devicemotion', handleMotion);
        startBtn.style.display = 'none';
        controls.style.display = 'block'; // 顯示記錄按鈕
      }
    });

    drawBackground();
  </script>
</body>
</html>
